<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp VIP Link Device</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }
        h2 {
            margin-bottom: 20px;
            color: #b92b27;
            background: -webkit-linear-gradient(#1565C0, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 10px rgba(0, 255, 255, 0.5);
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            color: #00ffff;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #00ffff;
            font-size: 16px;
            outline: none;
            border-bottom: 2px solid #8a2be2;
        }
        input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #8a2be2, #4a00e0);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
            margin-bottom: 10px;
        }
        button:hover {
            transform: scale(1.05);
        }
        .reset-btn {
            background: linear-gradient(45deg, #b92b27, #f12711);
            box-shadow: 0 0 15px rgba(241, 39, 17, 0.6);
        }
        .code-display {
            margin-top: 20px;
            font-size: 36px;
            letter-spacing: 5px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            display: none;
        }
        .timer-text {
            color: #ff3333;
            font-weight: bold;
            margin-top: 10px;
            font-size: 18px;
            display: none;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #ffaa00;
            display: none;
        }
        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00ffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 10px;
            color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .api-link-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border: 1px dashed #00ff00;
            font-family: monospace;
            word-break: break-all;
            color: #fff;
            font-size: 13px;
        }
        .instruction {
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Link Device (VIP API)</h2>
    
    <div id="input-section">
        <div class="input-group">
            <label>WhatsApp Number (With Country Code)</label>
            <input type="text" id="phone" placeholder="e.g., +919876543210">
        </div>
        
        <div class="input-group">
            <label>Set Your Unique Setup ID</label>
            <input type="text" id="custom-id" placeholder="e.g., b2k, rahul, unekid">
        </div>
        
        <button onclick="getCode()">Get 8-Digit Code</button>
        <button class="reset-btn" onclick="resetServer()">Reset Server (Fix Already Linked)</button>
    </div>
    
    <div class="code-display" id="code-box"></div>
    <div class="timer-text" id="timer-text"></div>
    <div class="loader" id="loading-spinner"></div>
    <div class="status" id="status-text"></div>
    
    <div class="success-box" id="success-box">
        <h3>✅ Connected Successfully!</h3>
        <p style="margin-top: 10px;">Your API URL is ready to use:</p>
        <div class="api-link-box" id="api-link"></div>
        <p class="instruction">Simple Usage: Send a GET request to this URL to send OTP.</p>
    </div>
</div>

<script>
    let checkInterval;
    let timerInterval;

    async function resetServer() {
        const statusText = document.getElementById('status-text');
        statusText.style.display = 'block';
        statusText.style.color = '#ff3333';
        statusText.innerText = "Resetting Server Memory...";
        
        try {
            const response = await fetch('/reset', { method: 'POST' });
            const data = await response.json();
            alert(data.message);
            statusText.innerText = "Server clean! You can get a new code now.";
            statusText.style.color = '#00ff00';
        } catch (e) {
            alert("Error resetting server.");
        }
    }

    async function getCode() {
        const phone = document.getElementById('phone').value;
        const customId = document.getElementById('custom-id').value || 'unekid';
        
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');
        const codeBox = document.getElementById('code-box');
        const timerText = document.getElementById('timer-text');
        
        if (!phone) {
            alert('Please enter a phone number');
            return;
        }

        // Reset previous UI states
        clearInterval(timerInterval);
        clearInterval(checkInterval);
        codeBox.style.display = 'none';
        timerText.style.display = 'none';
        
        statusText.style.display = 'block';
        statusText.style.color = '#ffaa00';
        statusText.innerText = "Requesting code... (Please wait)";
        spinner.style.display = 'block';
        
        try {
            const response = await fetch('/request-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber: phone, customId: customId })
            });
            
            const data = await response.json();
            
            if (data.error) {
                statusText.innerText = data.error;
                statusText.style.color = '#ff3333';
                spinner.style.display = 'none';
            } else {
                document.getElementById('input-section').style.display = 'none';
                codeBox.style.display = 'block';
                codeBox.innerText = data.code;
                
                statusText.innerText = "Waiting for you to enter this code in WhatsApp -> Linked Devices...";
                
                // Start 60 Second Countdown
                let timeLeft = 60;
                timerText.style.display = 'block';
                timerText.innerText = `Code expires in: ${timeLeft}s`;
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerText.innerText = `Code expires in: ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        clearInterval(checkInterval);
                        codeBox.style.display = 'none';
                        spinner.style.display = 'none';
                        timerText.innerText = "Code Expired! Please refresh the page and try again.";
                        document.getElementById('input-section').style.display = 'block';
                    }
                }, 1000);

                // Start checking connection status
                checkInterval = setInterval(checkStatus, 3000);
            }
        } catch (error) {
            statusText.innerText = "Error requesting code. Try clicking Get Code again.";
            statusText.style.color = '#ff3333';
            spinner.style.display = 'none';
        }
    }

    async function checkStatus() {
        try {
            const response = await fetch('/status');
            const data = await response.json();
            
            if (data.connected) {
                clearInterval(checkInterval);
                clearInterval(timerInterval); // Stop the 1 minute timer
                
                // Hide input, code, spinner, and status text
                document.getElementById('input-section').style.display = 'none';
                document.getElementById('code-box').style.display = 'none';
                document.getElementById('timer-text').style.display = 'none';
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('status-text').style.display = 'none';
                
                // Show success box
                document.getElementById('success-box').style.display = 'block';
                
                // Generate dynamic API URL
                const currentHost = window.location.origin;
                const finalId = data.finalId || 'unekid';
                const exampleUrl = `${currentHost}/api/${finalId}/+910000000000=OTP=8483`;
                
                document.getElementById('api-link').innerText = exampleUrl;
            }
        } catch (error) {
            console.error("Status check failed");
        }
    }

    // Initial check on page load in case it's already connected
    checkStatus();
</script>

</body>
</html>
